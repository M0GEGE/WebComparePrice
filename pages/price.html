<!DOCTYPE html>
<head>
    <meta charset="UTF-8">
        
    <!--Заголовок страницы-->>
    <title>Прайс | Compare All</title>
    
    <!--Шрифты-->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&family=Montserrat:wght@700&display=swap" rel="stylesheet">
    
    <!--Стили-->
    <link rel="stylesheet" href="style/base.css">
    <link rel="stylesheet" href="style/price.css">
</head>
<body>

    <!--Шапка-->
    <header class="hero">
        <h1>Прайс</h1>
    </header>

    <!--Меню-->
    <nav class="menu">
        <a href="main.html">Главная</a>
        <a href="price.html">Прайс</a>
        <a href="compare.html">Сравнить цены</a>
    </nav>

    <!--Панель "Товары +"-->
    <div class="products-panel" id ="openModal">
        <div class="products-title">Товары</div>
        <div class="add-button">+</div>
    </div>

    <!--Список карточек-->
    <div id="productsContainer"></div>

    <!--Добавление модального окна-->
    <div class="modal" id="productModal">
        <div class="modal-window">
            <button class="close-modal" id="closeModal">×</button>
            <h2>Добавить товар</h2>
            <input type="text" placeholder="Наименование" id="productName">
            <input type="number" placeholder="Цена" id="productPrice">
            <button class="add-product" id="addProduct">Добавить товар</button>
        </div>
    </div>
        
    <!--Изменение модального окна-->
    <div class="modal" id="editModal">
        <div class="modal-window">
            <button class="close-modal" id="closeEditModal">×</button>
            <h2>Редактировать товар</h2>
            <input type="text" placeholder="Наименование" id="editName">
            <input type="number" placeholder="Цена" id="editPrice">
            <button class="add-product" id="saveEdit">Сохранить</button>
        </div>
    </div>
        
    <!--Скрипты-->
    <script src="script.js" defer></script>
    
    <!--Футер(Подвал)-->
    <footer class="author">
        Dmitrieva K.N
    </footer>

</body>
</html>
